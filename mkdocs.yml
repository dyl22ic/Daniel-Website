site_name: My Docs
theme:
  name: material
  features:
    - navigation.tabs
    - toc.intergrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - index.md
  - quickstart.md
  - Guides:
    - how-to.md
    - tutorials.md
    - explanation.md
  - examples.md
  - api.md
